# render.yaml — Configuración automática para Render.com
# Este archivo despliega el backend de Palo Verde automáticamente

services:
  - type: web
    name: paloverde-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: paloverde-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MERCADOPAGO_ACCESS_TOKEN
        value: AQUI_VA_TU_ACCESS_TOKEN
      - key: WHATSAPP_NUMBER
        value: "573183177682"
      - key: FRONTEND_URL
        value: https://TU-SITIO.netlify.app
      - key: BACKEND_URL
        sync: false

databases:
  - name: paloverde-db
    plan: free
    databaseName: paloverde
    user: paloverde_user
